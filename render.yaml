envVarGroups:
  - name: registry-database
    envVars:
      - key: DB_URL
        fromDatabase:
          name: registry-db
          property: connectionString
  - name: registry-stripe
    envVars:
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
  - name: registry-config
    envVars:
      - key: BASE_URL
        value: https://tinyartempire.com
      - key: NOTIFICATION_FROM_EMAIL
        value: noreply@tinyartempire.com
      - key: STATIC_URL
        value: https://tinyartempire-assets.onrender.com
      # Postmark server token. Set in the Render dashboard, not committed
      # here. Registry::DAO::Notification routes email through Postmark's
      # SMTP relay when this is present.
      - key: POSTMARK_SERVER_TOKEN
        sync: false


databases:
  - name: registry-db
    databaseName: registry
    user: registry_user
    plan: standard
    region: oregon

services:
  - type: web
    name: registry-app
    runtime: docker
    plan: starter
    branch: main
    dockerfilePath: ./Dockerfile
    envVars:
      - fromGroup: registry-database
      - fromGroup: registry-stripe
      - fromGroup: registry-config
      - key: MOJO_MODE
        value: production
      - key: MOJO_SECRET
        generateValue: true
      - key: RENDER_API_KEY
        sync: false
      - key: RENDER_SERVICE_ID
        sync: false
      - key: PORT
        value: 10000
      - key: SERVICE_TYPE
        value: web
    healthCheckPath: /health
    autoDeploy: true
    disk:
      name: registry-storage
      mountPath: /app/storage
      sizeGB: 1

  - type: worker
    name: registry-worker
    runtime: docker
    plan: starter
    branch: main
    dockerfilePath: ./Dockerfile
    envVars:
      - fromGroup: registry-database
      - fromGroup: registry-stripe
      - fromGroup: registry-config
      - key: MOJO_MODE
        value: production
      - key: MOJO_SECRET
        fromService:
          type: web
          name: registry-app
          envVarKey: MOJO_SECRET
      - key: SERVICE_TYPE
        value: worker
    autoDeploy: true

  - type: cron
    name: registry-scheduler
    runtime: docker
    plan: starter
    branch: main
    dockerfilePath: ./Dockerfile
    schedule: "*/5 * * * *"
    envVars:
      - fromGroup: registry-database
      - fromGroup: registry-config
      - key: MOJO_MODE
        value: production
      - key: SERVICE_TYPE
        value: scheduler
    autoDeploy: true
