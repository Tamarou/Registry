envVarGroups:
  - name: registry-database
    envVars:
      - key: DB_URL
        fromDatabase:
          name: registry-db
          property: connectionString


databases:
  - name: registry-db
    databaseName: registry
    user: registry_user
    plan: standard
    region: oregon

services:
  - type: web
    name: registry-app
    runtime: docker
    plan: starter
    branch: main
    dockerfilePath: ./Dockerfile
    envVars:
      - fromGroup: registry-database
      - key: MOJO_MODE
        value: production
      - key: REGISTRY_SECRET
        generateValue: true
      - key: STRIPE_PUBLIC_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: EMAIL_FROM
        value: noreply@registry-demo.onrender.com
      - key: SUPPORT_EMAIL
        value: support@registry-demo.onrender.com
      - key: PORT
        value: 10000
      - key: SERVICE_TYPE
        value: web
    healthCheckPath: /health
    autoDeploy: true
    disk:
      name: registry-storage
      mountPath: /app/storage
      sizeGB: 1

  - type: worker
    name: registry-worker
    runtime: docker
    plan: starter
    branch: main
    dockerfilePath: ./Dockerfile
    envVars:
      - fromGroup: registry-database
      - key: MOJO_MODE
        value: production
      - key: REGISTRY_SECRET
        fromService:
          type: web
          name: registry-app
          envVarKey: REGISTRY_SECRET
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: EMAIL_FROM
        value: noreply@registry-demo.onrender.com
      - key: SERVICE_TYPE
        value: worker
    autoDeploy: true

  - type: cron
    name: registry-scheduler
    runtime: docker
    plan: starter
    branch: main
    dockerfilePath: ./Dockerfile
    schedule: "*/5 * * * *"
    envVars:
      - fromGroup: registry-database
      - key: MOJO_MODE
        value: production
      - key: SERVICE_TYPE
        value: scheduler
    autoDeploy: true
