# ABOUTME: Workflow for managing locations -- create new locations or edit
# ABOUTME: existing ones, and assign a user as contact person.

name: Location Management
description: Create or edit the locations where programs are held
slug: location-management
first_step: list-or-create

steps:
  - slug: list-or-create
    description: Select an existing location to edit or create a new one
    template: location-management/list-or-create
    class: Registry::DAO::WorkflowSteps::LocationList

  - slug: location-details
    description: Location name, address, and capacity
    template: location-management/location-details
    class: Registry::DAO::WorkflowSteps::LocationDetails

  - slug: select-contact
    description: Assign a contact person for this location
    template: location-management/select-contact
    class: Registry::DAO::WorkflowSteps::LocationContact

  - slug: complete
    description: Location saved
    template: location-management/complete
    class: Registry::DAO::WorkflowStep
