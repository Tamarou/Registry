name: Program Creation
slug: program-creation
description: |
  Workflow for creating new programs. Admin selects a program type,
  fills in curriculum details and scheduling requirements, reviews
  everything, and the system creates the Project record.

steps:
  - slug: program-type-selection
    description: Select the type of program to create
    class: Registry::DAO::WorkflowSteps::ProgramTypeSelection

  - slug: curriculum-details
    description: Define program name, description, and curriculum
    class: Registry::DAO::WorkflowSteps::CurriculumDetails

  - slug: requirements-and-patterns
    description: Set age/grade requirements and schedule patterns
    class: Registry::DAO::WorkflowSteps::RequirementsAndPatterns

  - slug: review-and-create
    description: Review all details and create the program
    class: Registry::DAO::WorkflowSteps::ReviewAndCreate

  - slug: complete
    description: Program created successfully
